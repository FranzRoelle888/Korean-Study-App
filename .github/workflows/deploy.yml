# Baut die App bei jedem Push auf "main" und veröffentlicht sie
# automatisch auf GitHub Pages. Du musst nichts von Hand machen.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # erlaubt auch manuelles Auslösen im GitHub-Web

# Rechte, die der Workflow zum Veröffentlichen braucht
permissions:
  contents: read
  pages: write
  id-token: write

# Immer nur ein Deploy gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Pakete installieren
        run: npm ci

      - name: App bauen
        run: npm run build

      - name: Pages vorbereiten
        uses: actions/configure-pages@v5

      - name: Gebaute Dateien hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
